name: Release Lexicon

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Optional explicit release version, for example 2026.06.4
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish lexicon
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip release]')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install SQLite tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl pkg-config libsqlite3-dev sqlite3

      - name: Compute release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          requested=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            requested="${{ inputs.version }}"
          fi
          if [[ -n "$requested" ]]; then
            version="$requested"
          else
            prefix="$(TZ=Asia/Taipei date +'%Y.%m')"
            last="$(
              git tag --list "${prefix}.*" |
                awk -F. -v prefix="$prefix" '
                  BEGIN { max = 0 }
                  ($1 "." $2) == prefix && $3 ~ /^[0-9]+$/ {
                    if (($3 + 0) > max) {
                      max = $3 + 0
                    }
                  }
                  END {
                    if (max > 0) {
                      print max
                    }
                  }
                '
            )"
            if [[ -z "$last" ]]; then
              version="${prefix}.1"
            else
              version="${prefix}.$((last + 1))"
            fi
          fi

          if git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
            echo "Release tag ${version} already exists." >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "LEXICON_VERSION=${version}" >> "$GITHUB_ENV"
          echo "RELEASE_BASE_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/${version}" >> "$GITHUB_ENV"

      - name: Run tests
        run: cargo test

      - name: Fetch pinned modern sources
        run: cargo run --release -- fetch-modern-sources

      - name: Build release artifacts
        run: cargo run --release -- prepare-release

      - name: Verify release artifacts
        shell: bash
        run: |
          set -euo pipefail
          release_dir="dist/${LEXICON_VERSION}"
          db_name="KeyKeySource-${LEXICON_VERSION}.db"

          cd "$release_dir"
          sha256sum -c SHA256SUMS
          test -f "KeyKeySource-${LEXICON_VERSION}.json"
          test -f "lexicon-manifest.json"

          row_count="$(sqlite3 "$db_name" "select count(*) from unigrams;")"
          if [[ "$row_count" -lt 300000 ]]; then
            echo "Unexpectedly low unigram count: ${row_count}" >&2
            exit 1
          fi

          for phrase in 測試輸入 輸入法 台灣 人工智慧 小紅書; do
            found="$(sqlite3 "$db_name" "select count(*) from unigrams where current = '${phrase}';")"
            if [[ "$found" -lt 1 ]]; then
              echo "Missing smoke-test phrase: ${phrase}" >&2
              exit 1
            fi
          done

          wo3_top="$(sqlite3 "$db_name" "select current from unigrams where qstring = '}Q' order by probability desc, current limit 1;")"
          if [[ "$wo3_top" != "我" ]]; then
            echo "Unexpected top candidate for ㄨㄛˇ: ${wo3_top}" >&2
            exit 1
          fi

          for phrase in 我 婐 捰 倭 䂺 婑 䰀 㦱; do
            found="$(sqlite3 "$db_name" "select count(*) from unigrams where qstring = '}Q' and current = '${phrase}';")"
            if [[ "$found" -lt 1 ]]; then
              echo "Missing ㄨㄛˇ native/Yahoo candidate: ${phrase}" >&2
              exit 1
            fi
          done

          wo3_count="$(sqlite3 "$db_name" "select count(*) from unigrams where qstring = '}Q';")"
          if [[ "$wo3_count" -ne 8 ]]; then
            echo "Unexpected ㄨㄛˇ candidate count: ${wo3_count}" >&2
            exit 1
          fi

          neutral_ge_top="$(sqlite3 "$db_name" "select current from unigrams where qstring = 'rq' order by probability desc, current limit 1;")"
          if [[ "$neutral_ge_top" != "個" ]]; then
            echo "Unexpected top candidate for ㄍㄜ˙ / ek7: ${neutral_ge_top}" >&2
            exit 1
          fi

          punctuation="$(sqlite3 "$db_name" "select current from unigrams where qstring = '_punctuation_<' order by probability desc, current limit 1;")"
          if [[ "$punctuation" != "，" ]]; then
            echo "Missing _punctuation_< full-width comma in unigrams: ${punctuation}" >&2
            exit 1
          fi

          standard_punctuation="$(sqlite3 "$db_name" "select current from unigrams where qstring = '_punctuation_Standard_<' order by probability desc, current limit 1;")"
          if [[ "$standard_punctuation" != "，" ]]; then
            echo "Missing _punctuation_Standard_< full-width comma in unigrams: ${standard_punctuation}" >&2
            exit 1
          fi

          cin_punctuation="$(sqlite3 "$db_name" "select value from 'Mandarin-bpmf-cin' where key = '_punctuation_<' order by value limit 1;")"
          if [[ "$cin_punctuation" != "，" ]]; then
            echo "Missing _punctuation_< full-width comma in Mandarin-bpmf-cin: ${cin_punctuation}" >&2
            exit 1
          fi

          cin_standard_punctuation="$(sqlite3 "$db_name" "select value from 'Mandarin-bpmf-cin' where key = '_punctuation_Standard_<' order by value limit 1;")"
          if [[ "$cin_standard_punctuation" != "，" ]]; then
            echo "Missing _punctuation_Standard_< full-width comma in Mandarin-bpmf-cin: ${cin_standard_punctuation}" >&2
            exit 1
          fi

          punctuation_list_count="$(sqlite3 "$db_name" "select count(*) from unigrams where qstring = '_punctuation_list';")"
          if [[ "$punctuation_list_count" -lt 50 ]]; then
            echo "Missing _punctuation_list rows in unigrams: ${punctuation_list_count}" >&2
            exit 1
          fi

          cin_punctuation_list_count="$(sqlite3 "$db_name" "select count(*) from 'Mandarin-bpmf-cin' where key = '_punctuation_list';")"
          if [[ "$cin_punctuation_list_count" -lt 50 ]]; then
            echo "Missing _punctuation_list rows in Mandarin-bpmf-cin: ${cin_punctuation_list_count}" >&2
            exit 1
          fi

          bpmf_cname_count="$(sqlite3 "$db_name" "select count(*) from 'Mandarin-bpmf-cin' where key = '__property_cname' and value = '注音';")"
          if [[ "$bpmf_cname_count" -lt 1 ]]; then
            echo "Missing Mandarin-bpmf-cin __property_cname metadata" >&2
            exit 1
          fi

          canned_messages_count="$(sqlite3 "$db_name" "select count(*) from prepopulated_service_data where key = 'canned_messages' and length(value) > 1000;")"
          if [[ "$canned_messages_count" -lt 1 ]]; then
            echo "Missing prepopulated_service_data/canned_messages payload" >&2
            exit 1
          fi

          canned_messages_timestamp_count="$(sqlite3 "$db_name" "select count(*) from prepopulated_service_data where key = 'canned_messages_timestamp' and cast(value as integer) > 0;")"
          if [[ "$canned_messages_timestamp_count" -lt 1 ]]; then
            echo "Missing positive prepopulated_service_data/canned_messages_timestamp" >&2
            exit 1
          fi

          obsolete_onekey_count="$(sqlite3 "$db_name" "select count(*) from prepopulated_service_data where key in ('onekey_services', 'onekey_services_timestamp');")"
          if [[ "$obsolete_onekey_count" -ne 0 ]]; then
            echo "Obsolete OneKey service data must not be shipped: ${obsolete_onekey_count} rows" >&2
            exit 1
          fi

          generic_cj_count="$(sqlite3 "$db_name" "select count(*) from 'Generic-cj-cin';")"
          if [[ "$generic_cj_count" -lt 70000 ]]; then
            echo "Unexpectedly low Generic-cj-cin row count: ${generic_cj_count}" >&2
            exit 1
          fi

          generic_simplex_count="$(sqlite3 "$db_name" "select count(*) from 'Generic-simplex-cin';")"
          if [[ "$generic_simplex_count" -lt 55000 ]]; then
            echo "Unexpectedly low Generic-simplex-cin row count: ${generic_simplex_count}" >&2
            exit 1
          fi

          bopomofo_correction_count="$(sqlite3 "$db_name" "select count(*) from 'BopomofoCorrection-bopomofo-correction-cin' where key = 'ㄅ' and value = '不';")"
          if [[ "$bopomofo_correction_count" -lt 1 ]]; then
            echo "Missing BopomofoCorrection ㄅ -> 不 row" >&2
            exit 1
          fi

          punctuation_halfwidth_count="$(sqlite3 "$db_name" "select count(*) from 'Punctuations-cj-halfwidth-cin' where key = ',' and value = ',';")"
          if [[ "$punctuation_halfwidth_count" -lt 1 ]]; then
            echo "Missing Punctuations-cj-halfwidth-cin comma row" >&2
            exit 1
          fi

          punctuation_mixedwidth_count="$(sqlite3 "$db_name" "select count(*) from 'Punctuations-cj-mixedwidth-cin' where key = ',' and value = '，';")"
          if [[ "$punctuation_mixedwidth_count" -lt 1 ]]; then
            echo "Missing Punctuations-cj-mixedwidth-cin comma row" >&2
            exit 1
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          release_dir="dist/${version}"

          gh release create "$version" \
            "${release_dir}/KeyKeySource-${version}.db" \
            "${release_dir}/KeyKeySource-${version}.json" \
            "${release_dir}/lexicon-manifest.json" \
            "${release_dir}/SHA256SUMS" \
            --target "$GITHUB_SHA" \
            --title "Chiaki KeyKey Lexicon ${version}" \
            --notes "Automated lexicon release built by the Rust release toolchain."
