name: Release Lexicon

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Optional explicit release version, for example 2026.06.4
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish lexicon
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip release]')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install SQLite tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsqlite3-dev sqlite3

      - name: Compute release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          requested=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            requested="${{ inputs.version }}"
          fi
          if [[ -n "$requested" ]]; then
            version="$requested"
          else
            prefix="$(TZ=Asia/Taipei date +'%Y.%m')"
            last="$(
              git tag --list "${prefix}.*" |
                awk -F. -v prefix="$prefix" '
                  BEGIN { max = 0 }
                  ($1 "." $2) == prefix && $3 ~ /^[0-9]+$/ {
                    if (($3 + 0) > max) {
                      max = $3 + 0
                    }
                  }
                  END {
                    if (max > 0) {
                      print max
                    }
                  }
                '
            )"
            if [[ -z "$last" ]]; then
              version="${prefix}.1"
            else
              version="${prefix}.$((last + 1))"
            fi
          fi

          if git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
            echo "Release tag ${version} already exists." >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "LEXICON_VERSION=${version}" >> "$GITHUB_ENV"
          echo "RELEASE_BASE_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/${version}" >> "$GITHUB_ENV"

      - name: Run tests
        run: cargo test

      - name: Build release artifacts
        run: cargo run --release -- prepare-release

      - name: Verify release artifacts
        shell: bash
        run: |
          set -euo pipefail
          release_dir="dist/${LEXICON_VERSION}"
          db_name="KeyKeySource-${LEXICON_VERSION}.db"

          cd "$release_dir"
          sha256sum -c SHA256SUMS
          test -f "KeyKeySource-${LEXICON_VERSION}.json"
          test -f "lexicon-manifest.json"

          row_count="$(sqlite3 "$db_name" "select count(*) from unigrams;")"
          if [[ "$row_count" -lt 300000 ]]; then
            echo "Unexpectedly low unigram count: ${row_count}" >&2
            exit 1
          fi

          for phrase in 測試輸入 輸入法 台灣 人工智慧 小紅書; do
            found="$(sqlite3 "$db_name" "select count(*) from unigrams where current = '${phrase}';")"
            if [[ "$found" -lt 1 ]]; then
              echo "Missing smoke-test phrase: ${phrase}" >&2
              exit 1
            fi
          done

          wo3_top="$(sqlite3 "$db_name" "select current from unigrams where qstring = '}Q' order by probability desc, current limit 1;")"
          if [[ "$wo3_top" != "我" ]]; then
            echo "Unexpected top candidate for ㄨㄛˇ: ${wo3_top}" >&2
            exit 1
          fi

          for phrase in 我 婐 捰 倭 䂺 婑 䰀 㦱; do
            found="$(sqlite3 "$db_name" "select count(*) from unigrams where qstring = '}Q' and current = '${phrase}';")"
            if [[ "$found" -lt 1 ]]; then
              echo "Missing ㄨㄛˇ native/Yahoo candidate: ${phrase}" >&2
              exit 1
            fi
          done

          wo3_count="$(sqlite3 "$db_name" "select count(*) from unigrams where qstring = '}Q';")"
          if [[ "$wo3_count" -ne 8 ]]; then
            echo "Unexpected ㄨㄛˇ candidate count: ${wo3_count}" >&2
            exit 1
          fi

          neutral_ge_top="$(sqlite3 "$db_name" "select current from unigrams where qstring = 'rq' order by probability desc, current limit 1;")"
          if [[ "$neutral_ge_top" != "個" ]]; then
            echo "Unexpected top candidate for ㄍㄜ˙ / ek7: ${neutral_ge_top}" >&2
            exit 1
          fi

          punctuation="$(sqlite3 "$db_name" "select current from unigrams where qstring = '_punctuation_<' order by probability desc, current limit 1;")"
          if [[ "$punctuation" != "，" ]]; then
            echo "Missing _punctuation_< full-width comma in unigrams: ${punctuation}" >&2
            exit 1
          fi

          standard_punctuation="$(sqlite3 "$db_name" "select current from unigrams where qstring = '_punctuation_Standard_<' order by probability desc, current limit 1;")"
          if [[ "$standard_punctuation" != "，" ]]; then
            echo "Missing _punctuation_Standard_< full-width comma in unigrams: ${standard_punctuation}" >&2
            exit 1
          fi

          cin_punctuation="$(sqlite3 "$db_name" "select value from 'Mandarin-bpmf-cin' where key = '_punctuation_<' order by value limit 1;")"
          if [[ "$cin_punctuation" != "，" ]]; then
            echo "Missing _punctuation_< full-width comma in Mandarin-bpmf-cin: ${cin_punctuation}" >&2
            exit 1
          fi

          cin_standard_punctuation="$(sqlite3 "$db_name" "select value from 'Mandarin-bpmf-cin' where key = '_punctuation_Standard_<' order by value limit 1;")"
          if [[ "$cin_standard_punctuation" != "，" ]]; then
            echo "Missing _punctuation_Standard_< full-width comma in Mandarin-bpmf-cin: ${cin_standard_punctuation}" >&2
            exit 1
          fi

          punctuation_list_count="$(sqlite3 "$db_name" "select count(*) from unigrams where qstring = '_punctuation_list';")"
          if [[ "$punctuation_list_count" -lt 400 ]]; then
            echo "Missing _punctuation_list rows in unigrams: ${punctuation_list_count}" >&2
            exit 1
          fi

          cin_punctuation_list_count="$(sqlite3 "$db_name" "select count(*) from 'Mandarin-bpmf-cin' where key = '_punctuation_list';")"
          if [[ "$cin_punctuation_list_count" -lt 400 ]]; then
            echo "Missing _punctuation_list rows in Mandarin-bpmf-cin: ${cin_punctuation_list_count}" >&2
            exit 1
          fi

          for symbol in '€' '₿' '①' '↔' '∑' '✓' '♪' '〒'; do
            unigram_symbol_count="$(sqlite3 "$db_name" "select count(*) from unigrams where qstring = '_punctuation_list' and current = '${symbol}';")"
            cin_symbol_count="$(sqlite3 "$db_name" "select count(*) from 'Mandarin-bpmf-cin' where key = '_punctuation_list' and value = '${symbol}';")"
            if [[ "$unigram_symbol_count" -lt 1 || "$cin_symbol_count" -lt 1 ]]; then
              echo "Missing supplemental punctuation symbol: ${symbol}" >&2
              exit 1
            fi
          done

          bpmf_cname_count="$(sqlite3 "$db_name" "select count(*) from 'Mandarin-bpmf-cin' where key = '__property_cname' and value = '注音';")"
          if [[ "$bpmf_cname_count" -lt 1 ]]; then
            echo "Missing Mandarin-bpmf-cin __property_cname metadata" >&2
            exit 1
          fi

          canned_messages_count="$(sqlite3 "$db_name" "select count(*) from prepopulated_service_data where key = 'canned_messages' and length(value) > 1000;")"
          if [[ "$canned_messages_count" -lt 1 ]]; then
            echo "Missing prepopulated_service_data/canned_messages payload" >&2
            exit 1
          fi

          canned_messages_timestamp_count="$(sqlite3 "$db_name" "select count(*) from prepopulated_service_data where key = 'canned_messages_timestamp' and cast(value as integer) > 0;")"
          if [[ "$canned_messages_timestamp_count" -lt 1 ]]; then
            echo "Missing positive prepopulated_service_data/canned_messages_timestamp" >&2
            exit 1
          fi

          obsolete_onekey_count="$(sqlite3 "$db_name" "select count(*) from prepopulated_service_data where key in ('onekey_services', 'onekey_services_timestamp');")"
          if [[ "$obsolete_onekey_count" -ne 0 ]]; then
            echo "Obsolete OneKey service data must not be shipped: ${obsolete_onekey_count} rows" >&2
            exit 1
          fi

          generic_cj_count="$(sqlite3 "$db_name" "select count(*) from 'Generic-cj-cin';")"
          if [[ "$generic_cj_count" -lt 70000 ]]; then
            echo "Unexpectedly low Generic-cj-cin row count: ${generic_cj_count}" >&2
            exit 1
          fi

          generic_simplex_count="$(sqlite3 "$db_name" "select count(*) from 'Generic-simplex-cin';")"
          if [[ "$generic_simplex_count" -lt 55000 ]]; then
            echo "Unexpectedly low Generic-simplex-cin row count: ${generic_simplex_count}" >&2
            exit 1
          fi

          bopomofo_correction_count="$(sqlite3 "$db_name" "select count(*) from 'BopomofoCorrection-bopomofo-correction-cin' where key = 'ㄅ' and value = '不';")"
          if [[ "$bopomofo_correction_count" -lt 1 ]]; then
            echo "Missing BopomofoCorrection ㄅ -> 不 row" >&2
            exit 1
          fi

          punctuation_halfwidth_count="$(sqlite3 "$db_name" "select count(*) from 'Punctuations-cj-halfwidth-cin' where key = ',' and value = ',';")"
          if [[ "$punctuation_halfwidth_count" -lt 1 ]]; then
            echo "Missing Punctuations-cj-halfwidth-cin comma row" >&2
            exit 1
          fi

          punctuation_mixedwidth_count="$(sqlite3 "$db_name" "select count(*) from 'Punctuations-cj-mixedwidth-cin' where key = ',' and value = '，';")"
          if [[ "$punctuation_mixedwidth_count" -lt 1 ]]; then
            echo "Missing Punctuations-cj-mixedwidth-cin comma row" >&2
            exit 1
          fi

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          release_dir="dist/${version}"
          metadata="${release_dir}/KeyKeySource-${version}.json"
          notes="${release_dir}/RELEASE_NOTES.md"

          previous_tag="$(git tag --sort=-v:refname | grep -v "^${version}$" | head -n 1 || true)"
          if [[ -n "$previous_tag" ]]; then
            range="${previous_tag}..${GITHUB_SHA}"
            git log --format='%h%x09%s' "$range" > "${release_dir}/commit-summary.tsv"
            git diff --name-only "$range" > "${release_dir}/changed-files.txt" || true
          else
            git log -1 --format='%h%x09%s' "$GITHUB_SHA" > "${release_dir}/commit-summary.tsv"
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" > "${release_dir}/changed-files.txt" || true
          fi

          VERSION="$version" \
          PREVIOUS_TAG="$previous_tag" \
          GITHUB_SHA="$GITHUB_SHA" \
          METADATA_PATH="$metadata" \
          COMMIT_SUMMARY_PATH="${release_dir}/commit-summary.tsv" \
          CHANGED_FILES_PATH="${release_dir}/changed-files.txt" \
          CHECKSUMS_PATH="${release_dir}/SHA256SUMS" \
          NOTES_PATH="$notes" \
          python3 <<'PY'
          import json
          import os
          import re
          from collections import defaultdict
          from pathlib import Path

          version = os.environ["VERSION"]
          previous_tag = os.environ.get("PREVIOUS_TAG") or ""
          sha = os.environ["GITHUB_SHA"]
          metadata = json.loads(Path(os.environ["METADATA_PATH"]).read_text())
          commits_path = Path(os.environ["COMMIT_SUMMARY_PATH"])
          changed_files_path = Path(os.environ["CHANGED_FILES_PATH"])
          checksums_path = Path(os.environ["CHECKSUMS_PATH"])
          notes_path = Path(os.environ["NOTES_PATH"])

          commits = []
          if commits_path.exists():
              for line in commits_path.read_text().splitlines():
                  if "\t" not in line:
                      continue
                  short_sha, subject = line.split("\t", 1)
                  commits.append((short_sha, subject))

          grouped = defaultdict(list)
          for short_sha, subject in commits:
              match = re.match(r"([a-z]+)(?:\([^)]+\))?!?:\s*(.+)", subject)
              if match:
                  group, title = match.groups()
              else:
                  group, title = "other", subject
              grouped[group].append((short_sha, title))

          group_titles = {
              "feat": "Features",
              "fix": "Fixes",
              "chore": "Maintenance",
              "docs": "Docs",
              "ci": "CI",
              "refactor": "Refactors",
              "test": "Tests",
              "perf": "Performance",
              "other": "Other",
          }

          counts = metadata["database"]["counts"]
          db = metadata["database"]
          normalized = metadata.get("normalized", {})

          def fmt_int(value):
              return f"{int(value):,}"

          def size_mb(size):
              return f"{int(size) / 1024 / 1024:.1f} MiB"

          def commit_line(item):
              short_sha, title = item
              return f"- `{short_sha}` {title}"

          lines = []
          lines.append(f"Automated ChiaKey lexicon release `{version}`.")
          lines.append("")
          lines.append("## Summary")
          lines.append("")
          lines.append(f"- Database: `{db['filename']}` ({size_mb(db['size'])})")
          lines.append(f"- Unigrams: {fmt_int(counts.get('unigrams', 0))}")
          lines.append(f"- Candidate rows: {fmt_int(counts.get('candidate_rows', 0))}")
          lines.append(
              f"- Associated phrases: {fmt_int(counts.get('associated_phrase_rows', 0))} heads / "
              f"{fmt_int(counts.get('associated_phrase_tails', 0))} tails"
          )
          lines.append(f"- Mandarin BPMF rows: {fmt_int(counts.get('mandarin_bpmf_cin_rows', 0))}")
          lines.append(f"- Bopomofo correction rows: {fmt_int(counts.get('bopomofo_correction_rows', 0))}")
          if normalized:
              lines.append(f"- Generated normalized rows: {fmt_int(normalized.get('rows', 0))}")
          if previous_tag:
              lines.append(f"- Changes summarized from `{previous_tag}` to `{sha[:7]}`")
          else:
              lines.append(f"- Changes summarized at `{sha[:7]}`")

          lines.append("")
          lines.append("## Changes")
          lines.append("")
          if commits:
              for group in ["feat", "fix", "chore", "docs", "ci", "refactor", "test", "perf", "other"]:
                  items = grouped.get(group, [])
                  if not items:
                      continue
                  lines.append(f"### {group_titles.get(group, group.title())}")
                  for item in items[:8]:
                      lines.append(commit_line(item))
                  if len(items) > 8:
                      lines.append(f"- ...and {len(items) - 8} more in the full commit list below.")
                  lines.append("")
          else:
              lines.append("- No commit metadata found for this release range.")
              lines.append("")

          lines.append("<details>")
          lines.append("<summary>Full commit list</summary>")
          lines.append("")
          if commits:
              for item in commits:
                  lines.append(commit_line(item))
          else:
              lines.append("_No commits found._")
          lines.append("")
          lines.append("</details>")
          lines.append("")

          changed_files = changed_files_path.read_text().splitlines() if changed_files_path.exists() else []
          lines.append("<details>")
          lines.append(f"<summary>Changed files ({len(changed_files)})</summary>")
          lines.append("")
          if changed_files:
              lines.append("```text")
              lines.extend(changed_files)
              lines.append("```")
          else:
              lines.append("_No changed files found._")
          lines.append("")
          lines.append("</details>")
          lines.append("")

          source_rows = []
          for source in metadata.get("sources", []):
              totals = {"seen": 0, "added": 0, "skipped": 0}
              stats = source.get("stats") or []
              for row in stats:
                  for key in totals:
                      totals[key] += int(row.get(key) or 0)
              source_rows.append((source["id"], source.get("license", ""), len(stats), totals))

          lines.append("<details>")
          lines.append("<summary>Source import summary</summary>")
          lines.append("")
          lines.append("| Source | License | Inputs | Seen | Added | Skipped |")
          lines.append("| --- | --- | ---:| ---:| ---:| ---:|")
          for source_id, license_name, stat_count, totals in source_rows:
              lines.append(
                  f"| `{source_id}` | {license_name} | {stat_count} | "
                  f"{fmt_int(totals['seen'])} | {fmt_int(totals['added'])} | {fmt_int(totals['skipped'])} |"
              )
          lines.append("")
          lines.append("</details>")
          lines.append("")

          lines.append("<details>")
          lines.append("<summary>Artifact checksums</summary>")
          lines.append("")
          lines.append("```text")
          lines.extend(checksums_path.read_text().splitlines())
          lines.append("```")
          lines.append("")
          lines.append("</details>")
          lines.append("")

          notes_path.write_text("\n".join(lines) + "\n")
          PY

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          release_dir="dist/${version}"

          gh release create "$version" \
            "${release_dir}/KeyKeySource-${version}.db" \
            "${release_dir}/KeyKeySource-${version}.json" \
            "${release_dir}/lexicon-manifest.json" \
            "${release_dir}/SHA256SUMS" \
            --target "$GITHUB_SHA" \
            --title "ChiaKey Lexicon ${version}" \
            --notes-file "${release_dir}/RELEASE_NOTES.md"
